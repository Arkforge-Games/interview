<svg width="360" height="80" viewBox="0 0 360 80" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="iconBg" x1="0" y1="0" x2="72" y2="72" gradientUnits="userSpaceOnUse">
      <stop stop-color="#4F46E5"/>
      <stop offset="1" stop-color="#7C3AED"/>
    </linearGradient>
    <linearGradient id="textGrad" x1="88" y1="20" x2="350" y2="60" gradientUnits="userSpaceOnUse">
      <stop stop-color="#1e1b4b"/>
      <stop offset="1" stop-color="#4338ca"/>
    </linearGradient>
  </defs>

  <!-- Icon: rounded square with star + mic -->
  <rect x="4" y="4" width="72" height="72" rx="18" fill="url(#iconBg)"/>
  <rect x="6" y="6" width="68" height="68" rx="16" fill="none" stroke="white" stroke-opacity="0.15" stroke-width="1"/>

  <!-- Star -->
  <path d="M40 14 L46.5 30 H63 L49.5 40 L55.5 56 L40 46.5 L24.5 56 L30.5 40 L17 30 H33.5 Z" fill="white"/>

  <!-- Tiny mic in star center -->
  <g transform="translate(35.5, 28)">
    <rect x="2" y="0" width="5" height="10" rx="2.5" fill="#4F46E5" opacity="0.8"/>
    <path d="M0.5,8 Q0.5,14.5 4.5,15 Q8.5,14.5 8.5,8" stroke="#4F46E5" stroke-width="1.2" fill="none" stroke-linecap="round" opacity="0.8"/>
    <line x1="4.5" y1="15" x2="4.5" y2="18" stroke="#4F46E5" stroke-width="1.2" stroke-linecap="round" opacity="0.8"/>
  </g>

  <!-- "SlayJobs" text -->
  <text x="92" y="36" fill="url(#textGrad)" font-family="Inter, system-ui, sans-serif" font-size="32" font-weight="900" letter-spacing="-0.5">
    Slay<tspan fill="#4F46E5">Jobs</tspan>
  </text>

  <!-- Tagline -->
  <text x="92" y="58" fill="#94a3b8" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="600" letter-spacing="0.5">AI Mock Interview Coach</text>
</svg>
