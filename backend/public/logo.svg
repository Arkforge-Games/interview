<svg width="512" height="512" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="512" y2="512" gradientUnits="userSpaceOnUse">
      <stop stop-color="#4F46E5"/>
      <stop offset="1" stop-color="#7C3AED"/>
    </linearGradient>
    <linearGradient id="starGlow" x1="180" y1="80" x2="332" y2="380" gradientUnits="userSpaceOnUse">
      <stop stop-color="#ffffff"/>
      <stop offset="1" stop-color="#e0e7ff"/>
    </linearGradient>
    <filter id="innerShadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#3730a3" flood-opacity="0.4"/>
    </filter>
    <filter id="starShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="3" stdDeviation="6" flood-color="#1e1b4b" flood-opacity="0.3"/>
    </filter>
  </defs>

  <!-- Rounded square background -->
  <rect width="512" height="512" rx="112" fill="url(#bgGrad)" filter="url(#innerShadow)"/>

  <!-- Subtle inner border -->
  <rect x="8" y="8" width="496" height="496" rx="108" fill="none" stroke="white" stroke-opacity="0.12" stroke-width="2"/>

  <!-- Main star (interview excellence) -->
  <g filter="url(#starShadow)">
    <path d="M256 72 L298 196 L428 196 L322 272 L362 396 L256 322 L150 396 L190 272 L84 196 L214 196 Z" fill="url(#starGlow)"/>
  </g>

  <!-- Small accent: microphone icon inside star center -->
  <g transform="translate(236, 205)">
    <!-- Mic body -->
    <rect x="12" y="0" width="16" height="36" rx="8" fill="#4F46E5" opacity="0.85"/>
    <!-- Mic arc -->
    <path d="M6,28 Q6,50 20,52 Q34,50 34,28" stroke="#4F46E5" stroke-width="3.5" fill="none" stroke-linecap="round" opacity="0.85"/>
    <!-- Mic stand -->
    <line x1="20" y1="52" x2="20" y2="64" stroke="#4F46E5" stroke-width="3.5" stroke-linecap="round" opacity="0.85"/>
    <line x1="10" y1="64" x2="30" y2="64" stroke="#4F46E5" stroke-width="3.5" stroke-linecap="round" opacity="0.85"/>
  </g>

  <!-- Bottom text: "SJ" monogram -->
  <text x="256" y="462" text-anchor="middle" fill="white" font-family="Inter, system-ui, sans-serif" font-size="48" font-weight="900" letter-spacing="8" opacity="0.6">SJ</text>
</svg>
